name: Update Config Settings

on:
  schedule:
  - cron: '0 12 * * 1'  # Weekly, Monday
  workflow_dispatch:

jobs:

  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4

    - name: Install stellar-cli
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        tag="$(gh api repos/stellar/stellar-cli/releases/latest --jq .tag_name)"
        ver="${tag#v}"
        curl -sSfL "https://github.com/stellar/stellar-cli/releases/download/${tag}/stellar-cli-${ver}-x86_64-unknown-linux-gnu.tar.gz" | tar xz stellar
        sudo mv stellar /usr/local/bin/

    - name: Update config settings
      id: update
      run: echo "file=$(./.scripts/update-config-settings)" >> $GITHUB_OUTPUT

    - name: Create Pull Request
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        file="${{ steps.update.outputs.file }}"

        if git diff --quiet "$file"; then
          echo "Config settings already in sync"
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        hash="$(git hash-object "$file" | cut -c1-16)"
        branch="update-config-settings/${hash}"

        # Check if PR already exists for this exact update
        if gh pr list --head "$branch" --state open --json number --jq '.[0].number' | grep -q .; then
          echo "PR already exists for this update"
          exit 0
        fi

        git checkout -b "$branch"
        git add "$file"
        git commit -m "Update testnet config settings (${hash})"
        git push -u origin "$branch"

        gh pr create \
          --title "Update testnet config settings (${hash})" \
          --body "This PR was automatically generated by the Update Config Settings workflow because the committed testnet config settings drifted from live testnet. Please review the value changes before merging." \
          --base main \
          --head "$branch"
